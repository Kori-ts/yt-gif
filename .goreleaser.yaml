version: 2

project_name: yt-gif

before:
  hooks:
    - go test ./...

builds:
  - id: yt-gif
    binary: yt-gif
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -buildvcs=false
    ldflags:
      - -s -w

archives:
  - id: binaries
    ids:
      - yt-gif
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- .Arch }}
    formats:
      - binary

  - id: archives
    ids:
      - yt-gif
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

nfpms:
  - id: linux_packages
    ids:
      - yt-gif
    package_name: yt-gif
    vendor: Kori
    homepage: https://github.com/Kori-ts/yt-gif
    maintainer: Kori
    description: Create GIFs from YouTube videos.
    license: MIT
    bindir: /usr/bin
    formats:
      - deb
      - rpm
      - apk

checksum:
  name_template: checksums.txt

winget:
  - name: yt-gif
    publisher: Kori
    short_description: Create GIFs from YouTube videos.
    license: MIT
    publisher_url: https://github.com/Kori-ts
    publisher_support_url: https://github.com/Kori-ts/yt-gif/issues/new
    package_identifier: Kori.YTGIF
    package_name: yt-gif
    ids:
      - archives
    homepage: https://github.com/Kori-ts/yt-gif
    description: yt-gif is a simple CLI tool for creating GIFs from YouTube videos.
    license_url: https://github.com/Kori-ts/yt-gif/blob/main/LICENSE
    copyright: Copyright (c) 2026 Kori
    tags:
      - youtube
      - gif
      - cli
    repository:
      owner: Kori-ts
      name: winget-pkgs
      branch: yt-gif-{{ .Version }}
      token: "{{ .Env.PACKAGE_PUBLISH_TOKEN }}"
      pull_request:
        enabled: true
        draft: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

release:
  github:
    owner: Kori-ts
    name: yt-gif
